<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San Diego Weather</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border-radius: 1.5rem;
      padding: 2.5rem 3rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .location {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .city {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 2rem;
    }

    .condition-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .emoji { font-size: 3.5rem; }

    .temp {
      font-size: 4rem;
      font-weight: 800;
      color: #f8fafc;
      line-height: 1;
    }

    .temp-c {
      font-size: 1.4rem;
      font-weight: 400;
      color: #94a3b8;
    }

    .condition-label {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat {
      background: #0f172a;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .updated {
      font-size: 0.75rem;
      color: #475569;
      text-align: center;
    }

    .pending {
      text-align: center;
      padding: 3rem 0;
    }

    .pending .emoji { display: block; font-size: 4rem; margin-bottom: 1rem; }
    .pending p { color: #64748b; font-size: 0.95rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="location">92101 · San Diego, CA</div>
    <div class="city">San Diego Weather</div>
    <div class="pending">
      <span class="emoji">⏳</span>
      <p>Waiting for the first scheduled update.<br>Weather data will appear here within the hour.</p>
    </div>
    <div class="updated">Not yet updated</div>
  </div>
</body>
</html>
