name: Claude Build

on:
  push:

concurrency:
  group: claude-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  build-with-claude:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Claude inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .mcp.json ]; then
            echo ".mcp.json must exist in the repository root" >&2
            exit 1
          fi

          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ANTHROPIC_API_KEY secret is required" >&2
            exit 1
          fi

          if [ -z "${{ secrets.GH_TOKEN }}" ]; then
            echo "GH_TOKEN secret is required for the GitHub MCP server" >&2
            exit 1
          fi

      - name: Run Claude Code with MCP
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Please read and execute the instructions in the .claude/CLAUDE.md file.
          claude_args: |
            --mcp-config .mcp.json \
            --strict-mcp-config \
            --permission-mode dontAsk \
            --allowedTools "Read" \
            --allowedTools "Edit" \
            --allowedTools "Write" \
            --allowedTools "WebFetch" \
            --allowedTools "Bash(curl:*)" \
            --allowedTools "Bash(git config:*)" \
            --allowedTools "Bash(git add:*)" \
            --allowedTools "Bash(git commit:*)" \
            --allowedTools "Bash(git push:*)" \
            --allowedTools "Bash(git pull:*)" \
            --allowedTools "Bash(git status:*)" \
            --allowedTools "Bash(date:*)" \
            --allowedTools "mcp__github__get_me" \
            --allowedTools "mcp__github__search_repositories" \
            --allowedTools "mcp__github__list_commits" \
            --allowedTools "mcp__github__get_commit"
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Copy generated site to docs
        run: |
          mkdir -p docs
          cp index.html docs/index.html

      - name: Commit docs output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html

          if git diff --cached --quiet; then
            echo "No docs changes to commit"
            exit 0
          fi

          git commit -m "chore: sync docs output"
          git push origin "HEAD:${GITHUB_REF_NAME}"
