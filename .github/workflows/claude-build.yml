name: Claude Build

on:
  push:

concurrency:
  group: claude-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  build-with-claude:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Claude inputs
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f .mcp.json ]; then
            echo ".mcp.json must exist in the repository root" >&2
            exit 1
          fi

          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY secret is required" >&2
            exit 1
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GH_TOKEN secret is required for the GitHub MCP server" >&2
            exit 1
          fi

      - name: Run Claude Code with MCP
        uses: anthropics/claude-code-base-action@v1
        with:
          prompt: |
            Please read and execute the instructions in the .claude/CLAUDE.md file.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mcp_config: .mcp.json
          allowed_tools: >
            Read,Edit,Write,WebFetch,Bash(curl:*),Bash(git config:*),Bash(git add:*),
            Bash(git commit:*),Bash(git push:*),Bash(git pull:*),Bash(git status:*),
            Bash(date:*),mcp__github_ro__get_me,mcp__github_ro__search_repositories,
            mcp__github_ro__list_commits,mcp__github_ro__get_commit
          claude_args: |
            --strict-mcp-config
            --permission-mode dontAsk
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Copy generated site to docs
        run: |
          mkdir -p docs
          cp index.html docs/index.html

      - name: Commit docs output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html

          if git diff --cached --quiet; then
            echo "No docs changes to commit"
            exit 0
          fi

          git commit -m "chore: sync docs output"
          git push origin "HEAD:${GITHUB_REF_NAME}"
