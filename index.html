<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>San Diego Weather</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1e293b;
      border-radius: 1.5rem;
      padding: 2.5rem 3rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .location {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 1.25rem;
    }
    .weather-main {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }
    .emoji {
      font-size: 4rem;
      line-height: 1;
    }
    .temp {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      color: #f1f5f9;
    }
    .temp-c {
      font-size: 1.5rem;
      font-weight: 400;
      color: #94a3b8;
      margin-left: 0.25rem;
    }
    .condition {
      font-size: 1.25rem;
      color: #cbd5e1;
      margin-bottom: 2rem;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .stat {
      background: #0f172a;
      border-radius: 1rem;
      padding: 1rem 1.25rem;
    }
    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 0.35rem;
    }
    .stat-value {
      font-size: 1.3rem;
      font-weight: 600;
      color: #e2e8f0;
    }
    .updated {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #475569;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="location">San Diego, CA &middot; 92101</div>
    <div class="weather-main">
      <span class="emoji">&#x2601;&#xFE0F;</span>
      <div>
        <div class="temp">65&deg;F<span class="temp-c">(18&deg;C)</span></div>
      </div>
    </div>
    <div class="condition">Overcast</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Feels Like</div>
        <div class="stat-value">65&deg;F (18&deg;C)</div>
      </div>
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value">84%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value">4 mph WSW</div>
      </div>
      <div class="stat">
        <div class="stat-label">UV Index</div>
        <div class="stat-value">1</div>
      </div>
    </div>
    <div class="updated">Last updated: 2026-04-06 15:24 UTC</div>
  </div>
</body>
</html>
